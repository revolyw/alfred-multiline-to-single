name: Bug report
description: Report a problem with the workflow
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve this project. Please fill in the sections below.
  - type: textarea
    id: describe
    attributes:
      label: Describe the bug
      description: A clear and concise description of what went wrong.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps others can follow.
      placeholder: |
        1. Copy multiline text …
        2. Type `m2s` in Alfred
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: alfred
    attributes:
      label: Alfred version
      placeholder: e.g. Alfred 5.5
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. macOS 15.5
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: output of `python3 --version`
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, screenshots, sample input (non-sensitive).
